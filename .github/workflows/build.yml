# Build a signed, notarized macOS DMG of the latest upstream AutoPTZ stable
# release, with the boxmot tracking extra bundled and the in-app updater pointed
# at this repo. Upstream source is checked out at the release tag and patched at
# build time; nothing from AutoPTZ is committed here.
name: AutoPTZ BoxMOT build

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if this repo already ships the latest upstream tag."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: autoptz-boxmot-build
  cancel-in-progress: false

env:
  UPSTREAM_REPO: AutoPTZ/autoptz

jobs:
  check:
    name: Check for new upstream release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # /releases/latest is the newest stable (non-prerelease) release, which
          # matches the app's default update channel.
          up="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" -q .tag_name)"
          mine="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" -q .tag_name 2>/dev/null || echo "")"
          echo "upstream latest: ${up:-<none>}"
          echo "this repo latest: ${mine:-<none>}"
          force="${{ github.event.inputs.force }}"
          if [ -z "${up}" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          elif [ "${up}" != "${mine}" ] || [ "${force}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${up}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }} DMG
    needs: check
    if: needs.check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-26-intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.check.outputs.tag }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Point updater at this repo
        run: |
          set -euo pipefail
          python - "$GITHUB_REPOSITORY" <<'PY'
          import pathlib, re, sys
          repo = sys.argv[1]
          p = pathlib.Path("autoptz/update/checker.py")
          s = p.read_text()
          s2 = re.sub(r'DEFAULT_REPO = "[^"]+"', f'DEFAULT_REPO = "{repo}"', s, count=1)
          assert s2 != s, "DEFAULT_REPO line not found — upstream layout changed"
          p.write_text(s2)
          print(f"DEFAULT_REPO -> {repo}")
          PY

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          printf '%s' "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/["[:space:]]//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          if ! security find-identity -v -p codesigning "$KEYCHAIN" \
              | grep -F "Developer ID Application:" >/dev/null; then
            echo "::error::Imported .p12 has no Developer ID Application identity."
            exit 1
          fi

      - name: Install dependencies (with boxmot)
        run: |
          set -euo pipefail
          python -m venv .venv
          .venv/bin/python tools/install.py \
            --upgrade-pip --packaging --with-tracking --editable --accelerator cpu

      # SKIP_INSTALL reuses the venv above (which includes boxmot) instead of the
      # script's default torch-free install.
      - name: Build signed + notarized DMG
        env:
          SKIP_INSTALL: "1"
          MAKE_DMG: "1"
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_SIGN_REQUIRED: "1"
        run: bash packaging/build_macos.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error
          compression-level: 0

  publish:
    name: Publish release ${{ needs.check.outputs.tag }}
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      # SHA256SUMS is what the in-app updater checks downloads against.
      - name: Assemble assets + SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p out
          find artifacts -type f -name '*.dmg' -exec cp {} out/ \;
          cd out
          sha256sum ./*.dmg | sed 's# \./#  #' > SHA256SUMS
          cat SHA256SUMS
      - name: Publish / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          set -euo pipefail
          notes="Automated build of upstream ${TAG} with the **boxmot** tracking extra bundled (BoT-SORT/DeepOCSORT/ByteTrack + OSNet ReID). The in-app updater on these builds tracks this repo.

          Upstream source: https://github.com/${UPSTREAM_REPO}/releases/tag/${TAG}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" out/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG}" out/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "AutoPTZ ${TAG} (BoxMOT build)" \
              --notes "${notes}" \
              --latest
          fi
